<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CUSTOMIZE: Change the title -->
    <title>Birthday Wishes 💖</title>
    <!-- CUSTOMIZE: Change favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./wishes.css">
</head>
<body>
    <audio id="bgMusic" loop>
        <source src="hbd.mp3" type="audio/mpeg">
    </audio>
    <div class="music-toggle" id="musicToggle" title="Toggle Music">
        <span class="music-icon"><i data-lucide="volume-x"></i></span>
    </div>
    <a href="index.html" class="back-btn" title="Go Back"><i data-lucide="arrow-left"></i></a>
    <div class="custom-cursor">
        <i data-lucide="heart" style="fill: #ff69b4; color: #ff69b4;"></i>
    </div>

    <div class="container">
        <!-- CUSTOMIZE: Change the name -->
        <h1>Happy Birthday Henna 💖</h1>

        <div id="reasons-container"></div>

        <button class="shuffle-button">Click Here... 💕</button>
        <div class="reason-counter"></div>

        <div class="ending-section">
            <div class="teddy-hug">
                <!-- CUSTOMIZE: Change the image -->
                <img src="./photo-1.jpg" alt="Special Photo">
            </div>
            <!-- CUSTOMIZE: Change the ending text -->
            <div class="ending-text">You're the BEST! 💖</div>
        </div>
    </div>

    <script src="wishes.js"></script>
</body>
</html>
